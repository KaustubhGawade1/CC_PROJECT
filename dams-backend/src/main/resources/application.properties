logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.databasemanagementsystem=DEBUG


# application.properties
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mydb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:myuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mypassword}

spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
upload.path=uploads
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# CORS Configuration (comma-separated list of allowed origins)
app.cors.allowed-origins=http://localhost:3001,http://localhost:3000,http://localhost:5173,https://front-damss.onrender.com

#STRIPE KEY
stripe.secret.key=${STRIPE_SECRET_KEY}

# Tomcat thread pool limits

server.tomcat.min-spare-threads=2

# HikariCP DB connection pool limits
spring.datasource.hikari.maximum-pool-size=5
server.tomcat.max-threads=50


spring.sql.init.platform=postgresql



